<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Iniciar Sesión — Myxsi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #06060e;
            --bg-surface: #0c0c1a;
            --bg-card: #111122;
            --text-primary: #f0edff;
            --text-secondary: #b8b5d0;
            --text-muted: #7a7798;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --accent-glow: #c4b5fd;
            --border: rgba(139, 92, 246, 0.15);
            --border-hover: rgba(139, 92, 246, 0.45);
            --gradient-1: #7c3aed;
            --gradient-2: #a855f7;
            --error: #f87171;
            --success: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        /* Fondo cósmico */
        .cosmic-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .cosmic-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            animation: cosmicFloat 20s ease-in-out infinite;
        }
        .cosmic-orb.orb-1 {
            width: 500px; height: 500px;
            background: #a855f7;
            top: -150px; right: -100px;
        }
        .cosmic-orb.orb-2 {
            width: 400px; height: 400px;
            background: #7c3aed;
            bottom: -100px; left: -80px;
            animation-delay: -10s;
        }

        @keyframes cosmicFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.05); }
        }

        /* Alerta */
        .alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.9rem 1.5rem;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            z-index: 1000;
            display: none;
            animation: slideDown 0.4s ease;
            text-align: center;
            max-width: 90%;
        }

        .alert.error {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid var(--error);
            color: var(--error);
            display: block;
        }

        .alert.success {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Contenedor principal */
        .login-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
        }

        /* Logo */
        .logo-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 800;
            text-decoration: none;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--gradient-2), var(--gradient-1));
            border-radius: 10px;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 1rem;
            color: white;
            box-shadow: 0 0 24px rgba(139, 92, 246, 0.4);
        }

        .logo-link span {
            background: linear-gradient(135deg, var(--accent-glow), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Selector de tipo */
        .type-selector {
            display: flex;
            background: rgba(17, 17, 34, 0.7);
            border-radius: 50px;
            padding: 0.3rem;
            border: 1px solid var(--border);
            margin-bottom: 1.75rem;
            position: relative;
        }

        .type-btn {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            border: none;
            background: transparent;
            color: var(--text-muted);
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .type-btn.active {
            color: #ffffff;
        }

        .type-slider {
            position: absolute;
            top: 0.3rem;
            left: 0.3rem;
            height: calc(100% - 0.6rem);
            width: calc(50% - 0.3rem);
            background: linear-gradient(135deg, var(--gradient-2), var(--gradient-1));
            border-radius: 50px;
            z-index: 1;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        .type-slider.right {
            left: calc(50% + 0rem);
        }

        /* Tarjeta del formulario */
        .login-card {
            background: rgba(17, 17, 34, 0.65);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 20%; width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.6), transparent);
        }

        .login-card h2 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            letter-spacing: -0.02em;
        }

        .login-card .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        /* Campos del formulario */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            letter-spacing: 0.01em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.6rem;
            background: rgba(10, 10, 24, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-light);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
            background: rgba(15, 15, 30, 0.8);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px;
        }

        .toggle-password:hover {
            color: var(--text-secondary);
        }

        /* Opciones adicionales */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.8rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .remember-me input {
            accent-color: var(--accent);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: var(--accent-glow);
            text-decoration: underline;
        }

        /* Botón de inicio de sesión */
        .btn-login {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--gradient-2), var(--gradient-1));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            box-shadow: 0 8px 28px rgba(139, 92, 246, 0.3);
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(139, 92, 246, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner de carga */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Separador */
        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.78rem;
            margin: 1.5rem 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: var(--border);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* Botón de Google */
        .btn-google {
            width: 100%;
            padding: 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--border-hover);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        /* Link de registro */
        .register-link {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .register-link a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .register-link a:hover {
            color: var(--accent-glow);
            text-decoration: underline;
        }

        /* Volver al inicio */
        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.82rem;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .back-home a:hover {
            color: var(--accent-light);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.25rem;
                border-radius: 20px;
            }
            .login-card h2 {
                font-size: 1.3rem;
            }
            .type-btn {
                font-size: 0.78rem;
                padding: 0.6rem 0.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Fondo -->
    <div class="cosmic-bg">
        <div class="cosmic-orb orb-1"></div>
        <div class="cosmic-orb orb-2"></div>
    </div>

    <!-- Alerta -->
    <div class="alert" id="alertBox"></div>

    <!-- Login -->
    <div class="login-wrapper">
        <!-- Logo -->
        <div class="logo-section">
            <a href="index.html" class="logo-link">
                <div class="logo-icon">✦</div>
                <span>Myxsi</span>
            </a>
        </div>

        <!-- Selector de tipo de usuario -->
        <div class="type-selector" id="typeSelector">
            <div class="type-slider" id="typeSlider"></div>
            <button class="type-btn active" onclick="switchLoginType('personal', this)" id="btnPersonal">
                <i class="fas fa-user"></i> Personal
            </button>
            <button class="type-btn" onclick="switchLoginType('business', this)" id="btnBusiness">
                <i class="fas fa-building"></i> Empresarial
            </button>
        </div>

        <!-- Formulario -->
        <div class="login-card">
            <h2 id="loginTitle">Iniciar Sesión</h2>
            <p class="login-subtitle" id="loginSubtitle">Accede a tu cuenta personal</p>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="tu@correo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Recordarme
                    </label>
                    <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login" id="loginButton">
                    <span class="spinner" id="spinner"></span>
                    <span id="loginButtonText"><i class="fas fa-sign-in-alt"></i> Ingresar a Myxsi</span>
                </button>
            </form>

            <div class="divider">o continuar con</div>

            <button class="btn-google" onclick="handleGoogleLogin()">
                <img src="https://www.google.com/favicon.ico" alt="Google">
                Iniciar sesión con Google
            </button>

            <div class="divider"></div>

            <p class="register-link">
                ¿No tienes una cuenta? <a href="registro.html">Crear cuenta</a>
            </p>
        </div>

        <!-- Volver -->
        <div class="back-home">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            signInWithPopup, 
            GoogleAuthProvider,
            sendPasswordResetEmail,
            setPersistence,
            browserLocalPersistence,
            browserSessionPersistence,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqkZHfAcDku_cNd1cmjAOul-TLNkbPL20",
            authDomain: "myxsi-e4ba3.firebaseapp.com",
            projectId: "myxsi-e4ba3",
            storageBucket: "myxsi-e4ba3.firebasestorage.app",
            messagingSenderId: "321958728313",
            appId: "1:321958728313:web:0cd9f5a3f748b19e48faa8",
            measurementId: "G-54WPJGNXHP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const analytics = getAnalytics(app);
        const googleProvider = new GoogleAuthProvider();

        window.auth = auth;
        window.googleProvider = googleProvider;
        window.sendPasswordResetEmail = sendPasswordResetEmail;
        window.setPersistence = setPersistence;
        window.browserLocalPersistence = browserLocalPersistence;
        window.browserSessionPersistence = browserSessionPersistence;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signInWithPopup = signInWithPopup;
        window.onAuthStateChanged = onAuthStateChanged;

        console.log('✅ Firebase inicializado correctamente');
    </script>

    <script>
        let currentType = 'personal';

        // Esperar a que Firebase esté listo
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (window.onAuthStateChanged && window.auth) {
                    window.onAuthStateChanged(window.auth, (user) => {
                        if (user && user.emailVerified) {
                            console.log('👤 Usuario ya autenticado:', user.email);
                            redirectAfterLogin(user);
                        }
                    });
                }
            }, 1000);
        });

        // Cambiar tipo de login
        function switchLoginType(type, btn) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const typeSlider = document.getElementById('typeSlider');
            const loginTitle = document.getElementById('loginTitle');
            const loginSubtitle = document.getElementById('loginSubtitle');
            const loginButtonText = document.getElementById('loginButtonText');

            if (type === 'business') {
                typeSlider.classList.add('right');
                loginTitle.textContent = 'Iniciar Sesión Empresarial';
                loginSubtitle.textContent = 'Accede al panel de soporte IT empresarial';
                loginButtonText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar al panel empresarial';
            } else {
                typeSlider.classList.remove('right');
                loginTitle.textContent = 'Iniciar Sesión';
                loginSubtitle.textContent = 'Accede a tu cuenta personal';
                loginButtonText.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ingresar a Myxsi';
            }
        }

        // Mostrar/ocultar contraseña
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Mostrar alerta
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = 'alert ' + type;
            setTimeout(() => {
                alertBox.className = 'alert';
                alertBox.style.display = 'none';
            }, 5000);
        }

        // Mostrar/ocultar loading
        function setLoading(loading) {
            const spinner = document.getElementById('spinner');
            const loginButton = document.getElementById('loginButton');
            if (loading) {
                spinner.style.display = 'block';
                loginButton.disabled = true;
            } else {
                spinner.style.display = 'none';
                loginButton.disabled = false;
            }
        }

        // Manejar inicio de sesión
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showAlert('Por favor completa todos los campos', 'error');
                return;
            }

            setLoading(true);

            try {
                const persistence = rememberMe 
                    ? window.browserLocalPersistence 
                    : window.browserSessionPersistence;
                
                await window.setPersistence(window.auth, persistence);

                const userCredential = await window.signInWithEmailAndPassword(
                    window.auth, 
                    email, 
                    password
                );

                const user = userCredential.user;

                // Verificar si el correo está verificado
                if (!user.emailVerified) {
                    showAlert('⚠️ Debes verificar tu correo electrónico antes de continuar. Revisa tu bandeja de entrada', 'error');
                    setLoading(false);
                    return;
                }

                console.log('✅ Inicio de sesión exitoso:', user.email);
                showAlert('✅ Inicio de sesión exitoso', 'success');

                setTimeout(() => {
                    redirectAfterLogin(user);
                }, 800);

            } catch (error) {
                console.error('❌ Error de inicio de sesión:', error);
                setLoading(false);

                let errorMessage = 'Error al iniciar sesión';
                switch (error.code) {
                    case 'auth/invalid-credential':
                        errorMessage = 'Correo o contraseña incorrectos';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'El correo electrónico no es válido';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'Esta cuenta ha sido deshabilitada';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'No existe una cuenta con este correo. <a href="registro.html">¿Crear cuenta?</a>';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Contraseña incorrecta';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Demasiados intentos. Intenta más tarde';
                        break;
                    default:
                        errorMessage = error.message;
                }
                showAlert(errorMessage, 'error');
            }
        }

        // Iniciar sesión con Google
        async function handleGoogleLogin() {
            setLoading(true);
            try {
                const result = await window.signInWithPopup(window.auth, window.googleProvider);
                const user = result.user;
                console.log('✅ Inicio de sesión con Google exitoso:', user.email);
                showAlert('✅ Inicio de sesión con Google exitoso', 'success');

                setTimeout(() => {
                    redirectAfterLogin(user);
                }, 800);
            } catch (error) {
                console.error('❌ Error con Google:', error);
                setLoading(false);
                if (error.code !== 'auth/popup-closed-by-user') {
                    if (error.code === 'auth/account-exists-with-different-credential') {
                        showAlert('Ya existe una cuenta con este correo. Inicia sesión con otro método', 'error');
                    } else {
                        showAlert('Error al iniciar sesión con Google', 'error');
                    }
                }
            }
        }

        // Recuperar contraseña
        async function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showAlert('Ingresa tu correo electrónico para recuperar la contraseña', 'error');
                return;
            }

            try {
                await window.sendPasswordResetEmail(window.auth, email);
                showAlert('📧 Correo de recuperación enviado. Revisa tu bandeja de entrada', 'success');
            } catch (error) {
                console.error('❌ Error al enviar recuperación:', error);
                let errorMessage = 'Error al enviar el correo de recuperación';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'No existe una cuenta con este correo. <a href="registro.html">¿Crear cuenta?</a>';
                }
                showAlert(errorMessage, 'error');
            }
        }

        // Redirigir después del login
        function redirectAfterLogin(user) {
            if (currentType === 'business') {
                console.log('🏢 Redirigiendo a panel empresarial');
                // window.location.href = '/empresarial/panel.html';
            } else {
                console.log('👤 Redirigiendo a panel personal');
                // window.location.href = '/plataforma/panel.html';
            }
            console.log('👤 Usuario:', user.email);
        }

        // Swipe en toggle
        const typeSelector = document.getElementById('typeSelector');
        const typeSlider = document.getElementById('typeSlider');
        const btnPersonal = document.getElementById('btnPersonal');
        const btnBusiness = document.getElementById('btnBusiness');
        let touchStartX = 0;

        typeSelector.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        typeSelector.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 40) {
                if (diff > 0 && typeSlider.classList.contains('right')) {
                    switchLoginType('personal', btnPersonal);
                } else if (diff < 0 && !typeSlider.classList.contains('right')) {
                    switchLoginType('business', btnBusiness);
                }
            }
        });
    </script>
</body>
</html>
