<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Myxsi Chat — Asistente IA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #06060e; --bg-surface: #0c0c1a; --bg-card: #111122;
            --bg-input: #0a0a18; --text-primary: #f0edff; --text-secondary: #b8b5d0;
            --text-muted: #7a7798; --accent: #8b5cf6; --accent-light: #a78bfa;
            --accent-glow: #c4b5fd; --border: rgba(139, 92, 246, 0.2);
            --gradient-1: #7c3aed; --gradient-2: #a855f7;
            --user-bubble: #1a1040; --bot-bubble: #0f0f20; --error: #f87171; --success: #34d399;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-deep);
            color: var(--text-primary); height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }
        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 9999; display: flex; align-items: center;
            justify-content: center; flex-direction: column; gap: 1.5rem;
        }
        .loading-screen.hidden { display: none; }
        .loading-spinner {
            width: 48px; height: 48px; border: 3px solid rgba(139, 92, 246, 0.2);
            border-top-color: var(--accent-light); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-muted); font-size: 0.9rem; }

        .sidebar {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100vh;
            background: var(--bg-surface); border-right: 1px solid var(--border);
            z-index: 50; transition: left 0.3s; display: flex; flex-direction: column; padding: 1rem;
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 49; display: none;
        }
        .sidebar-overlay.show { display: block; }
        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
        }
        .sidebar-header h3 { font-size: 1rem; font-weight: 700; }
        .new-chat-btn {
            padding: 0.5rem 1rem; background: var(--accent); border: none;
            border-radius: 8px; color: white; cursor: pointer; font-size: 0.8rem; font-weight: 600;
        }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 0.7rem; border-radius: 10px; cursor: pointer; margin-bottom: 0.3rem;
            font-size: 0.85rem; color: var(--text-secondary); border: 1px solid transparent;
            display: flex; justify-content: space-between; align-items: center; transition: all 0.2s;
        }
        .chat-item:hover { background: rgba(139, 92, 246, 0.1); border-color: var(--border); }
        .chat-item.active { background: rgba(139, 92, 246, 0.2); border-color: var(--accent-light); color: var(--text-primary); }
        .chat-item-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
        .chat-item-delete {
            opacity: 0; cursor: pointer; color: var(--error); font-size: 0.7rem;
            padding: 0.3rem; transition: opacity 0.2s;
        }
        .chat-item:hover .chat-item-delete { opacity: 1; }

        .chat-header {
            background: rgba(6, 6, 14, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); padding: 0.85rem 1.25rem;
            display: flex; align-items: center; justify-content: space-between; z-index: 10; flex-shrink: 0;
        }
        .header-left { display: flex; align-items: center; gap: 0.6rem; }
        .icon-btn {
            width: 34px; height: 34px; background: rgba(255,255,255,0.04);
            border: 1px solid var(--border); border-radius: 10px; color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; transition: all 0.3s; text-decoration: none;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
        .header-info { display: flex; align-items: center; gap: 0.5rem; }
        .header-avatar {
            width: 36px; height: 36px; background: linear-gradient(135deg, var(--gradient-2), var(--gradient-1));
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; color: white;
        }
        .header-name { font-weight: 700; font-size: 0.95rem; }
        .header-status { font-size: 0.7rem; color: #34d399; display: flex; align-items: center; gap: 0.3rem; }
        .status-dot { width: 6px; height: 6px; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .header-right { display: flex; gap: 0.4rem; }

        .chat-container {
            flex: 1; overflow-y: auto; padding: 1.25rem; display: flex;
            flex-direction: column; gap: 0.75rem;
        }
        .message { display: flex; gap: 0.6rem; max-width: 90%; animation: msgIn 0.35s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message-avatar {
            width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 0.8rem;
        }
        .message.user .message-avatar { background: linear-gradient(135deg, var(--gradient-2), var(--gradient-1)); color: white; }
        .message.bot .message-avatar { background: var(--bg-card); border: 1px solid var(--border); color: var(--accent-light); }
        .message-content {
            background: var(--bot-bubble); border: 1px solid var(--border);
            border-radius: 16px; padding: 0.8rem 1rem; font-size: 0.88rem; line-height: 1.55;
        }
        .message.user .message-content { background: var(--user-bubble); }
        .message-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.3rem; }
        .typing-indicator { display: none; align-items: center; gap: 0.6rem; padding: 0.5rem 1rem; }
        .typing-indicator.show { display: flex; }
        .typing-dots { display: flex; gap: 0.25rem; }
        .typing-dots span { width: 6px; height: 6px; background: var(--accent-light); border-radius: 50%; animation: typingBounce 1.4s infinite; }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

        .welcome-message { text-align: center; padding: 2rem 1rem; }
        .welcome-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .welcome-message h3 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .welcome-message p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
        .suggestions { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
        .suggestion-chip {
            background: rgba(139, 92, 246, 0.08); border: 1px solid var(--border);
            border-radius: 50px; padding: 0.5rem 1rem; font-size: 0.78rem;
            color: var(--text-secondary); cursor: pointer; transition: all 0.3s;
        }
        .suggestion-chip:hover { background: rgba(139, 92, 246, 0.18); color: var(--text-primary); }

        .chat-input-area {
            padding: 0.85rem 1.25rem; border-top: 1px solid var(--border);
            background: rgba(6, 6, 14, 0.9); backdrop-filter: blur(20px); flex-shrink: 0;
        }
        .input-wrapper {
            display: flex; gap: 0.5rem; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 16px; padding: 0.4rem;
        }
        .input-wrapper textarea {
            flex: 1; background: transparent; border: none; color: var(--text-primary);
            font-size: 0.88rem; font-family: 'Inter', sans-serif; resize: none;
            padding: 0.5rem; outline: none; max-height: 120px;
        }
        .input-wrapper textarea::placeholder { color: var(--text-muted); }
        .send-btn {
            width: 38px; height: 38px; background: linear-gradient(135deg, var(--gradient-2), var(--gradient-1));
            border: none; border-radius: 12px; color: white; cursor: pointer; font-size: 0.9rem;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .send-btn:disabled { opacity: 0.4; }
        .input-footer {
            display: flex; justify-content: space-between; margin-top: 0.4rem;
            font-size: 0.68rem; color: var(--text-muted); padding: 0 0.5rem;
        }

        @media (max-width: 768px) {
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Cargando Myxsi...</div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>💬 Mis Chats</h3>
            <button class="new-chat-btn" onclick="createNewChat()">+ Nuevo</button>
        </div>
        <div class="chats-list" id="chatsList"></div>
    </div>

    <header class="chat-header">
        <div class="header-left">
            <button class="icon-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <a href="index.html" class="icon-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="header-info">
                <div class="header-avatar">✦</div>
                <div>
                    <div class="header-name">Myxsi</div>
                    <div class="header-status"><span class="status-dot"></span> En línea</div>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="icon-btn" onclick="switchModel()" title="Cambiar modelo"><i class="fas fa-brain"></i></button>
            <button class="icon-btn" onclick="handleLogout()" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="chat-container" id="chatContainer">
        <div class="welcome-message" id="welcomeMsg">
            <div class="welcome-icon">✨</div>
            <h3>¡Hola! Soy Myxsi</h3>
            <p>Tu asistente de inteligencia artificial.</p>
            <div class="suggestions">
                <span class="suggestion-chip" onclick="sendSuggestion('¿Cómo prepararme para la PAES?')">📚 PAES</span>
                <span class="suggestion-chip" onclick="sendSuggestion('Ayúdame con un proyecto')">💡 Proyecto</span>
                <span class="suggestion-chip" onclick="sendSuggestion('Necesito soporte IT')">🔧 Soporte</span>
                <span class="suggestion-chip" onclick="sendSuggestion('¿Qué puedes hacer?')">🤔 Ayuda</span>
            </div>
        </div>
        <div class="typing-indicator" id="typingIndicator">
            <div class="message-avatar" style="background:var(--bg-card);border:1px solid var(--border);color:var(--accent-light);width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;">✦</div>
            <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="Escribe tu mensaje..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="input-footer">
            <span id="modelLabel">Modelo: GroqCloud</span>
            <span>Myxsi puede cometer errores</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqkZHfAcDku_cNd1cmjAOul-TLNkbPL20",
            authDomain: "myxsi-e4ba3.firebaseapp.com",
            projectId: "myxsi-e4ba3",
            storageBucket: "myxsi-e4ba3.firebasestorage.app",
            messagingSenderId: "321958728313",
            appId: "1:321958728313:web:0cd9f5a3f748b19e48faa8"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app);
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwvuzbQNvs5aAxgb38MH0tMCkVoXakxPVTSc6gH8Mbvcqu6LwXoztBe-SaZqbOv9o8/exec';

        const CONFIG = {
            groq: {
                apiKey: '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',
                endpoint: 'https://api.groq.com/openai/v1/chat/completions',
                model: 'llama-3.3-70b-versatile'
            },
            gemini: {
                apiKey: 'AIzaSyA9l29pT5uKkdpAQVhMwxIOdWpOp1xWi1k',
                endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent'
            }
        };

        let currentModel = 'groq';
        let chatHistory = [];
        let currentUser = null;
        let currentChatId = null;

        async function callAPI(action, params = {}) {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, ...params })
            });
            return await res.json();
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                if (window.onAuthStateChanged) {
                    window.onAuthStateChanged(window.auth, async (user) => {
                        if (!user) { window.location.href = 'login.html'; return; }
                        if (!user.emailVerified) {
                            alert('Verifica tu correo primero');
                            await window.signOut(window.auth);
                            window.location.href = 'login.html';
                            return;
                        }
                        currentUser = user;
                        await callAPI('createUser', {
                            uid: user.uid,
                            email: user.email,
                            name: user.displayName || user.email.split('@')[0]
                        });
                        document.getElementById('loadingScreen').classList.add('hidden');
                        initChat();
                    });
                }
            }, 500);
        });

        async function initChat() {
            updateModelLabel();
            await loadChatsFromDrive();
            if (!currentChatId) await createNewChat(false);
            document.getElementById('userInput').focus();
        }

        async function loadChatsFromDrive() {
            const res = await callAPI('getChats', { uid: currentUser.uid });
            if (res.success && res.chats) {
                const chatList = document.getElementById('chatsList');
                chatList.innerHTML = '';
                res.chats.forEach(chat => {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    if (chat.chatId === currentChatId) div.classList.add('active');
                    div.innerHTML = `
                        <span class="chat-item-title" onclick="loadChat('${chat.chatId}')">${chat.title || 'Nuevo chat'}</span>
                        <span class="chat-item-delete" onclick="event.stopPropagation();deleteChat('${chat.chatId}')"><i class="fas fa-trash"></i></span>
                    `;
                    chatList.appendChild(div);
                });
                if (res.chats.length > 0 && !currentChatId) await loadChat(res.chats[0].chatId);
            }
        }

        async function loadChat(chatId) {
            const res = await callAPI('getMessages', { uid: currentUser.uid, chatId: chatId });
            if (res.success && res.chat) {
                currentChatId = chatId;
                chatHistory = res.chat.messages.map(m => ({ role: m.role, content: m.content, timestamp: m.timestamp }));
                renderMessages();
                await loadChatsFromDrive();
                if (window.innerWidth < 768) toggleSidebar();
            }
        }

        async function createNewChat(showSidebar = true) {
            const res = await callAPI('createChat', { uid: currentUser.uid, title: 'Nuevo chat' });
            if (res.success && res.chat) {
                currentChatId = res.chat.chatId;
                chatHistory = [];
                renderMessages();
                await loadChatsFromDrive();
                if (showSidebar && window.innerWidth < 768) toggleSidebar();
            }
        }

        async function deleteChat(chatId) {
            if (!confirm('¿Eliminar este chat?')) return;
            await callAPI('deleteChat', { uid: currentUser.uid, chatId: chatId });
            if (currentChatId === chatId) { currentChatId = null; chatHistory = []; renderMessages(); }
            await loadChatsFromDrive();
            if (!currentChatId) await createNewChat(false);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        function switchModel() {
            currentModel = currentModel === 'groq' ? 'gemini' : 'groq';
            updateModelLabel();
        }

        function updateModelLabel() {
            document.getElementById('modelLabel').textContent = 'Modelo: ' + (currentModel === 'groq' ? 'GroqCloud' : 'Gemini');
        }

        function renderMessages() {
            const container = document.getElementById('chatContainer');
            const welcome = document.getElementById('welcomeMsg');
            const typing = document.getElementById('typingIndicator');
            container.querySelectorAll('.message').forEach(m => m.remove());
            if (chatHistory.length === 0) { welcome.style.display = 'block'; return; }
            welcome.style.display = 'none';
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message ' + (msg.role === 'user' ? 'user' : 'bot');
                div.innerHTML = `
                    <div class="message-avatar">${msg.role === 'user' ? '<i class="fas fa-user"></i>' : '✦'}</div>
                    <div class="message-content">${msg.content.replace(/\n/g, '<br>')}<div class="message-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div></div>
                `;
                container.insertBefore(div, typing);
            });
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content) {
            chatHistory.push({ role, content, timestamp: Date.now() });
            document.getElementById('welcomeMsg').style.display = 'none';
            const div = document.createElement('div');
            div.className = 'message ' + (role === 'user' ? 'user' : 'bot');
            div.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '<i class="fas fa-user"></i>' : '✦'}</div>
                <div class="message-content">${content.replace(/\n/g, '<br>')}<div class="message-time">${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div></div>
            `;
            document.getElementById('chatContainer').insertBefore(div, document.getElementById('typingIndicator'));
            document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
        }

        function showTyping(show) {
            document.getElementById('typingIndicator').style.display = show ? 'flex' : 'none';
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const message = input.value.trim();
            if (!message) return;
            if (!currentChatId) await createNewChat(false);
            input.value = ''; btn.disabled = true; input.disabled = true;
            addMessage('user', message);
            await callAPI('saveMessage', { uid: currentUser.uid, chatId: currentChatId, message: { role: 'user', content: message, timestamp: Date.now() } });
            showTyping(true);
            try {
                let response = currentModel === 'groq' ? await callGroqAPI(message) : await callGeminiAPI(message);
                showTyping(false);
                addMessage('assistant', response);
                await callAPI('saveMessage', { uid: currentUser.uid, chatId: currentChatId, message: { role: 'assistant', content: response, timestamp: Date.now() } });
                await loadChatsFromDrive();
            } catch (error) {
                showTyping(false);
                addMessage('assistant', '❌ Error: ' + error.message);
            } finally {
                btn.disabled = false; input.disabled = false; input.focus();
            }
        }

        async function callGroqAPI(msg) {
            const res = await fetch(CONFIG.groq.endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + CONFIG.groq.apiKey },
                body: JSON.stringify({
                    model: CONFIG.groq.model,
                    messages: [
                        { role: 'system', content: 'Eres Myxsi, una IA amigable. Responde en español.' },
                        ...chatHistory.slice(-10).map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content })),
                        { role: 'user', content: msg }
                    ],
                    temperature: 0.7,
                    max_tokens: 2048
                })
            });
            if (!res.ok) throw new Error('Error ' + res.status);
            return (await res.json()).choices[0].message.content;
        }

        async function callGeminiAPI(msg) {
            const res = await fetch(CONFIG.gemini.endpoint + '?key=' + CONFIG.gemini.apiKey, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [
                        { role: 'user', parts: [{ text: 'Eres Myxsi. Responde en español.' }] },
                        { role: 'model', parts: [{ text: 'Entendido.' }] },
                        ...chatHistory.slice(-10).map(m => ({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] })),
                        { role: 'user', parts: [{ text: msg }] }
                    ],
                    generationConfig: { temperature: 0.7, maxOutputTokens: 2048 }
                })
            });
            if (!res.ok) throw new Error('Error ' + res.status);
            return (await res.json()).candidates[0].content.parts[0].text;
        }

        function sendSuggestion(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function handleLogout() {
            if (confirm('¿Cerrar sesión?')) {
                await window.signOut(window.auth);
                sessionStorage.clear();
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
